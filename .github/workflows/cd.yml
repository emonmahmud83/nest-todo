name: Deploy Lawal App

on:
  push:
    branches: [ dev ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/lawalbackendbackendtwo:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/lawalbackendbackendtwo:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          # username: ${{ secrets.SH_USERNAME }}
          username: "ec2-user"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            
            cd ~/digitialscreen

            docker compose down

            docker compose  pull

            docker compose up -d
            docker system prune -af

  notify:
    runs-on: ubuntu-latest
    needs: [ build-and-push, deploy ]
    if: always()
    steps:
      - name: Send Telegram Notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ (needs.build-and-push.result == 'success' && needs.deploy.result == 'success') && '✅ Deployment Successful for Lawal App!' || '❌ Deployment Failed for Lawal App!' }}

            **Build Result**: ${{ needs.build-and-push.result }}
            **Deploy Result**: ${{ needs.deploy.result }}
            **Commit**: ${{ github.sha }}
            **Run Logs**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
